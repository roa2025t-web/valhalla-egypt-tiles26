name: Build Valhalla Egypt Tiles

on:
  workflow_dispatch: # هذا السطر يسمح لك بتشغيل البناء يدوياً متى شئت

jobs:
  build-egypt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Egypt PBF
        run: |
          # تحميل خريطة مصر من Geofabrik
          curl -L https://download.geofabrik.de/africa/egypt-latest.osm.pbf -o egypt.pbf

      - name: Build Tiles with Valhalla
        run: |
          mkdir -p custom_tiles
          # إنشاء الإعدادات والبناء داخل حاوية Docker
          docker run --rm -v $(pwd):/data ghcr.io/valhalla/valhalla:latest \
            valhalla_build_config \
            --mjolnir-tile-dir /data/custom_tiles \
            --mjolnir-tile-extract /data/egypt_tiles.tar \
            --mjolnir-timezone /data/custom_tiles/timezones.sqlite \
            --mjolnir-admin /data/custom_tiles/admins.sqlite > valhalla.json
          
          docker run --rm -v $(pwd):/data ghcr.io/valhalla/valhalla:latest \
            valhalla_build_tiles -c /data/valhalla.json /data/egypt.pbf

      - name: Compress and Upload
        run: |
          # ضغط الملفات الناتجة
          tar -cvzf egypt_valhalla_data.tar.gz custom_tiles valhalla.json egypt_tiles.tar

      - name: Save Artifact
        uses: actions/upload-artifact@v4
        with:
          name: egypt-tiles-package
          path: egypt_valhalla_data.tar.gz
